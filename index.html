<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OBS Presentation Dock</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #09090b; color: #fafafa; font-family: ui-sans-serif, system-ui; user-select: none; }
        .deck-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 12px; }
        .deck-btn { 
            position: relative;
            aspect-ratio: 1/1; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            text-align: center; 
            border-radius: 16px; 
            font-weight: 800; 
            border: 2px solid #27272a; 
            background: linear-gradient(145deg, #18181b, #09090b); 
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
        .deck-btn:active { transform: scale(0.92); }
        .deck-btn .index-tag {
            position: absolute;
            top: 8px;
            left: 10px;
            font-size: 10px;
            color: #52525b;
            font-family: monospace;
        }
        .deck-btn .scene-name {
            font-size: 12px;
            padding: 0 8px;
            line-height: 1.2;
            text-transform: uppercase;
            color: #e4e4e7;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .active-btn { 
            border-color: #3b82f6 !important; 
            background: linear-gradient(145deg, #2563eb, #1e40af) !important; 
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.4), inset 0 0 10px rgba(255,255,255,0.1); 
        }
        .active-btn .index-tag { color: #bfdbfe; }
        .active-btn .scene-name { color: white; }
        .mute-active { background: linear-gradient(145deg, #dc2626, #7f1d1d) !important; border-color: #ef4444 !important; }
        .glass { background: rgba(9, 9, 11, 0.85); backdrop-filter: blur(20px); border-bottom: 1px solid #27272a; }
    </style>
</head>
<body class="min-h-screen pb-20">

    <div class="sticky top-0 z-50 glass p-6 mb-6">
        <div class="max-w-2xl mx-auto">
            <div class="flex justify-between items-start mb-4">
                <div class="flex-1">
                    <p class="text-[10px] font-black text-blue-500 uppercase tracking-widest mb-1">CANLI SAHNE</p>
                    <h1 id="currentName" class="text-3xl font-black truncate tracking-tighter">---</h1>
                </div>
                <div class="text-right ml-4">
                    <p id="statusText" class="text-[10px] font-black text-zinc-500 uppercase tracking-widest mb-1">OFFLINE</p>
                    <div class="flex justify-end"><span id="statusDot" class="w-3 h-3 rounded-full bg-red-600"></span></div>
                </div>
            </div>
            
            <div class="w-full bg-zinc-800 h-2 rounded-full mb-3 overflow-hidden">
                <div id="progressBar" class="bg-blue-600 h-full transition-all duration-500" style="width: 0%"></div>
            </div>

            <div class="flex justify-between text-[10px] font-black uppercase text-zinc-500">
                <div id="counter">SAHNE 0 / 0</div>
                <div id="nextLabel" class="text-blue-400 italic font-bold">SIRADA: ---</div>
            </div>
        </div>
    </div>

    <div class="max-w-2xl mx-auto px-4">
        <div class="grid grid-cols-2 gap-4 mb-8">
            <button onclick="control('prev')" class="bg-zinc-900 h-24 rounded-3xl flex items-center justify-center text-3xl border border-zinc-800 active:scale-95 transition-all shadow-lg">◀️</button>
            <button onclick="control('next')" class="bg-blue-600 h-24 rounded-3xl flex items-center justify-center text-3xl border border-blue-500 shadow-[0_0_15px_rgba(59,130,246,0.3)] active:scale-95 transition-all">▶️</button>
            <button id="muteBtn" onclick="control('mute')" class="col-span-2 bg-zinc-900 h-16 rounded-3xl flex items-center justify-center gap-4 font-black border border-zinc-800 transition-all shadow-md">
                <span id="muteIcon" class="text-xl">🔊</span> 
                <span id="muteText">HOPARLÖR AÇIK</span>
            </button>
        </div>

        <h2 class="text-[10px] font-black text-zinc-600 uppercase tracking-[0.2em] mb-4 px-2 italic">Matrix Kontrol</h2>
        <div id="deck" class="deck-grid"></div>
    </div>

    <script>
        async function updateState() {
            try {
                const res = await fetch('/api/state');
                const data = await res.json();
                
                if (data.error) {
                    document.getElementById('statusText').innerText = "DATA ERROR";
                    document.getElementById('statusDot').className = "w-3 h-3 rounded-full bg-yellow-500";
                    return;
                }

                // UI Güncelleme
                document.getElementById('currentName').innerText = data.current;
                document.getElementById('nextLabel').innerText = `SIRADA: ${data.next}`;
                document.getElementById('counter').innerText = `SAHNE ${data.index} / ${data.total}`;
                
                const percent = (data.index / data.total) * 100;
                document.getElementById('progressBar').style.width = `${percent}%`;

                // Hoparlör Mute
                const mBtn = document.getElementById('muteBtn');
                if(data.isMuted) {
                    mBtn.classList.add('mute-active');
                    document.getElementById('muteText').innerText = "HOPARLÖR KAPALI";
                    document.getElementById('muteIcon').innerText = "🔇";
                } else {
                    mBtn.classList.remove('mute-active');
                    document.getElementById('muteText').innerText = "HOPARLÖR AÇIK";
                    document.getElementById('muteIcon').innerText = "🔊";
                }

                // Deck (Matrix)
                const deck = document.getElementById('deck');
                
                // Sahne isimleri değişmiş mi kontrol et
                const currentButtonNames = Array.from(deck.querySelectorAll('.scene-name')).map(el => el.innerText);
                const scenesMatch = data.allScenes.length === currentButtonNames.length && 
                                   data.allScenes.every((s, i) => s === currentButtonNames[i]);

                if(!scenesMatch) {
                    deck.innerHTML = '';
                    data.allScenes.forEach((scene, i) => {
                        const btn = document.createElement('button');
                        btn.id = `btn-${i}`;
                        btn.className = 'deck-btn';
                        btn.innerHTML = `
                            <span class="index-tag">${i + 1}</span>
                            <span class="scene-name">${scene}</span>
                        `;
                        btn.onclick = () => control('set', scene);
                        deck.appendChild(btn);
                    });
                }

                data.allScenes.forEach((scene, i) => {
                    const btn = document.getElementById(`btn-${i}`);
                    if(btn) {
                        const isActive = scene === data.current;
                        btn.classList.toggle('active-btn', isActive);
                    }
                });

                // Status OK
                document.getElementById('statusText').innerText = "ONLINE";
                document.getElementById('statusDot').className = "w-3 h-3 rounded-full bg-green-500 shadow-[0_0_10px_rgba(34,197,94,0.6)]";

            } catch (err) {
                document.getElementById('statusText').innerText = "OFFLINE";
                document.getElementById('statusDot').className = "w-3 h-3 rounded-full bg-red-600";
            }
        }

        async function control(action, name = '') {
            const url = name ? `/control/set?name=${encodeURIComponent(name)}` : `/control/${action}`;
            await fetch(url);
            setTimeout(updateState, 50); // Küçük bir gecikmeyle durumu hemen çek
        }

        setInterval(updateState, 1000);
        updateState();
    </script>
</body>
</html>
